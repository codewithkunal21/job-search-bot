<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniScout | Job Matches</title>
    <!-- Modern Typography: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --text-secondary: #94a3b8;
            --primary-gradient: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
            color: var(--text-color);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        .header {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeInDown 0.8s ease-out forwards;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin: 0;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.2rem;
            margin-top: 1rem;
            font-weight: 300;
        }

        .job-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
        }

        /* Glassmorphism Job Cards */
        .job-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        /* Staggered load animation */
        .job-card:nth-child(1) { animation-delay: 0.1s; }
        .job-card:nth-child(2) { animation-delay: 0.2s; }
        .job-card:nth-child(3) { animation-delay: 0.3s; }
        .job-card:nth-child(4) { animation-delay: 0.4s; }
        .job-card:nth-child(5) { animation-delay: 0.5s; }
        .job-card:nth-child(n+6) { animation-delay: 0.6s; }

        .job-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 
                        0 0 20px rgba(99, 102, 241, 0.2);
            border-color: rgba(168, 85, 247, 0.4);
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .company-info {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .company-icon {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.6rem;
            border-radius: 50%;
            color: #a855f7;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Match Score - Distinctive styling */
        .score-badge {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .score-excellent {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        
        .score-good {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }

        .score-average {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .job-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin: 0 0 1rem 0;
            line-height: 1.3;
            flex-grow: 1;
            color: white;
        }

        .job-location {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .skill-tag {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .job-card:hover .skill-tag {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.3);
        }

        /* Interactive Apply Button */
        .apply-btn {
            margin-top: auto;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            background: var(--primary-gradient);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            overflow: hidden;
            box-sizing: border-box;
            border: none;
            cursor: pointer;
        }

        .apply-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ec4899, #a855f7, #6366f1);
            z-index: -1;
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        .apply-btn i {
            margin-left: 8px;
            transition: transform 0.3s ease;
        }

        .apply-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(168, 85, 247, 0.4);
        }

        .apply-btn:hover::before {
            opacity: 1;
        }

        .apply-btn:hover i {
            transform: translateX(4px);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Ambient floating glowing orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 10s infinite ease-in-out;
            pointer-events: none;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(99, 102, 241, 0.12);
            top: 5%;
            left: 10%;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: rgba(236, 72, 153, 0.12);
            bottom: 10%;
            right: 10%;
            animation-delay: -5s;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }
            .job-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .last-updated {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: -0.5rem;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .scrape-btn {
            margin-top: 1.5rem;
            padding: 0.8rem 1.8rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-family: 'Outfit', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            position: relative;
            z-index: 10;
        }

        .scrape-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .scrape-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.4);
        }

        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <header class="header">
            <h1>Job Match Engine</h1>
            <p>Curated high-match opportunities tailored to your developer profile.</p>
            <div class="last-updated"><i class="far fa-clock"></i> Last Updated: {{ last_updated }}</div>
            
            <div class="search-container" style="display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap;">
                <input type="text" id="searchField" placeholder="Enter Job Title (e.g. Frontend Engineer)" 
                       style="padding: 0.8rem 1.5rem; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; width: 300px; font-family: 'Outfit'; outline: none;">
                <button id="scrape-btn" class="scrape-btn" onclick="startScraping()" style="margin-top: 0;">
                    <i class="fas fa-search"></i> Search & Scrape
                </button>
            </div>
        </header>

        <main class="job-grid" id="job-grid">
            <!-- Jobs dynamically loaded from jobs_report.json via Javascript -->
        </main>
    </div>

    <script>
        // 1. DYNAMIC NO-CACHE FETCH
        async function loadJobs() {
            try {
                // FIXED: Fetch request uses a timestamp to 100% bypass browser cache, hitting the new SQLite API
                const response = await fetch('/api/jobs?t=' + Date.now(), {cache: "no-store"});
                const jobs = await response.json();
                
                const grid = document.getElementById('job-grid');
                grid.innerHTML = '';
                
                if (!jobs || jobs.length === 0) {
                    grid.innerHTML = `
            <div style="grid-column: 1 / -1; text-align: center; color: var(--text-secondary); padding: 4rem; background: var(--card-bg); border-radius: 20px; border: 1px solid var(--card-border);">
                <i class="fas fa-search" style="font-size: 3rem; margin-bottom: 1rem; color: #6366f1;"></i>
                <h2>No job matches found!</h2>
                <p>Run the scraping engine to generate fresh jobs.db SQLite data.</p>
            </div>`;
                    return;
                }
                
                // Sort descending
                jobs.sort((a, b) => parseFloat(b.match_score || 0) - parseFloat(a.match_score || 0));

                jobs.forEach((job) => {
                    let scoreBadge = '';
                    const score = parseFloat(job.match_score);
                    if (score >= 80) {
                        scoreBadge = `<div class="score-badge score-excellent" title="Excellent Match"><i class="fas fa-fire"></i> ${score}%</div>`;
                    } else if (score >= 50) {
                        scoreBadge = `<div class="score-badge score-good" title="Good Match"><i class="fas fa-check-circle"></i> ${score}%</div>`;
                    } else {
                        scoreBadge = `<div class="score-badge score-average" title="Average Match"><i class="fas fa-info-circle"></i> ${score}%</div>`;
                    }
                    
                    let skillsHtml = '';
                    if (Array.isArray(job.matched_skills)) {
                        job.matched_skills.slice(0, 4).forEach(skill => {
                            skillsHtml += `<span class="skill-tag">${skill.charAt(0).toUpperCase() + skill.slice(1)}</span>`;
                        });
                        if (job.matched_skills.length > 4) {
                            skillsHtml += `<span class="skill-tag" style="background: rgba(168, 85, 247, 0.15);">+${job.matched_skills.length - 4} more</span>`;
                        }
                    }
                    
                    const card = document.createElement('article');
                    card.className = 'job-card';
                    card.innerHTML = `
                <div class="meta-row">
                    <div class="company-info">
                        <div class="company-icon"><i class="fas fa-building"></i></div>
                        <span>${job.company}</span>
                    </div>
                    ${scoreBadge}
                </div>
                <h2 class="job-title">${job.title}</h2>
                <div class="job-location"><i class="fas fa-map-marker-alt" style="color: #6366f1;"></i> ${job.location}</div>
                <div class="skills-container">${skillsHtml}</div>
                <a href="${job.application_link}" target="_blank" rel="noopener noreferrer" class="apply-btn">
                    Apply Now <i class="fas fa-arrow-right"></i>
                </a>`;
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error("Error loading json", err);
            }
        }
        
        // 2. CHECK STATUS AND POLL
        async function checkStatus() {
            try {
                const response = await fetch('/api/scrape/status?t=' + Date.now(), {cache: "no-store"});
                const data = await response.json();
                
                if (!data.is_scraping) {
                    // Update timestamp
                    const timeEl = document.querySelector('.last-updated');
                    if (timeEl) {
                        const now = new Date();
                        timeEl.innerHTML = '<i class="far fa-clock"></i> Last Updated: ' + now.toLocaleString();
                    }
                    
                    // Fetch fresh jobs immediately
                    await loadJobs();
                    
                    // Reset button
                    const btn = document.getElementById('scrape-btn');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-search"></i> Search & Scrape';
                } else {
                    // Poll again in 3s
                    setTimeout(checkStatus, 3000);
                }
            } catch (error) {
                console.error("Error checking status:", error);
                setTimeout(checkStatus, 3000);
            }
        }

        // 3. START SCRAPING TRIGGER WITH DYNAMIC SEARCH
        async function startScraping() {
            const btn = document.getElementById('scrape-btn');
            const searchField = document.getElementById('searchField');
            let keyword = searchField ? searchField.value.trim() : "";
            
            if (!keyword) {
                keyword = "Data Scientist";
            }
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch spinner"></i> Scraping in progress...';
            
            try {
                // Submit keyword separately to configuration API
                await fetch('/api/update_search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ keyword: keyword })
                });

                // Trigger actual background scraper process
                const response = await fetch('/api/scrape', { method: 'POST' });
                const result = await response.json();
                
                if (result.status === "started" || result.status === "already_running") {
                    // Begin polling for completion
                    setTimeout(checkStatus, 3000);
                }
            } catch (error) {
                console.error("Error starting scrape:", error);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-search"></i> Search & Scrape';
                alert("Failed to start scraping.");
            }
        }

        // Initial launch
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/scrape/status?t=' + Date.now(), {cache: "no-store"});
                const data = await response.json();
                if (data.is_scraping) {
                    const btn = document.getElementById('scrape-btn');
                    if(btn) {
                        btn.disabled = true;
                        btn.innerHTML = '<i class="fas fa-circle-notch spinner"></i> Scraping in progress...';
                    }
                    checkStatus();
                } else {
                    loadJobs();
                }
            } catch (error) {
                loadJobs();
            }
        });
    </script>
</body>
</html>
